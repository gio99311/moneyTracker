<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Money Tracker</title>
    <!-- CSS -->
    <link rel="stylesheet" href="./style.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
  </head>
  <body class="container-fluid m-0 p-0">
    <!-- HEADER -->
    <header class="w-100 px-3">
        <div class="row justify-content-center align-items-center">
            <div class="col-12 col-md-8">
                <h1 class="title py-5">Money Tracker</h1>
            </div>
        </div>
        <div class="row justify-content-center align-items-start">
            <div class="col-12">
                <div class="card-custom">
                <div class="card-header-custom">Dashboard</div>
                <div class="card-body-custom">
                    <h5 class="color-a">Ecco la panoramica delle tue spese!</h5>
                    <div class="row mx-auto">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <h6>Totale Spese</h6>
                                <p class="fw-bold fs-4 color-a" id="totale-spese">€ 0.00</p>
                            </div>
                            <div class="mb-3">
                                <h6>Numero di Spese</h6>
                                <p class="fw-bold fs-4 color-a" id="numero-spese">0</p>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <h6>Spese per Categoria</h6>
                            <div id="riepilogo-categorie">
                                <!-- Qui verranno inserite le categorie dinamicamente -->
                            </div>                            <div class="mt-3">
                                <h6>Spese Visibili</h6>
                                <p class="fw-bold fs-5 color-a" id="spese-visibili">0 spese filtrate - € 0.00</p>
                            </div>                        </div>
                    </div>
                </div>
                </div>
            </div>
        </div>

    </header>
    <!-- FINE HEADER -->

    <!-- FORM INSERIMENTO SPESA -->
    <section class="m-0">
        <div class="row justify-content-center">
            <div class="col-12">
                <h2 class="color-a py-5 text-center">Aggiungi una nuova spesa</h2>
            </div>
            <div class="col-10">
                <form id="form-spese">
                    <div class="mb-3">
                        <label for="descrizione" class="form-label">Descrizione</label>
                        <input type="text" class="form-control" id="descrizione" placeholder="Inserisci la descrizione della spesa">
                    </div>
                    <div class="mb-3">
                        <label for="importo" class="form-label">Importo</label>
                        <input type="number" class="form-control" id="importo" placeholder="Inserisci l'importo della spesa">
                    </div>
                    <div class="mb-3">
                        <label for="categoria" class="form-label">Categoria</label>
                        <select class="form-select" id="categoria">
                            <option value="" selected>Seleziona una categoria</option>
                            <option value="Alimentari">Alimentari</option>
                            <option value="Trasporti">Trasporti</option>
                            <option value="Intrattenimento">Intrattenimento</option>
                            <option value="Bollette">Bollette</option>
                            <option value="Altro">Altro</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="data" class="form-label">Data</label>
                        <input type="date" class="form-control" id="data">
                    </div>
                    <button type="submit" class="btn btn-primary">Aggiungi Spesa</button>
                </form>
            </div>
        </div>
    </section>
    <!-- FINE FORM INSERIMENTO SPESA -->

    <!-- VISUALIZZAZIONE SPESA -->
    <section class="w-100">
        <div class="row justify-content-center">
            <div class="col-12">
                <h2 class="color-a py-5 text-center">Le tue spese</h2>
            </div>
        </div>
        <!-- CONTROLLI FILTRO E RICERCA -->
        <div class="row justify-content-center mb-4">
            <div class="col-12 col-md-8">
                <div class="row px-2 g-2">
                    <div class="col-12 col-md-6">
                        <label for="filtro-categoria" class="form-label my-2">Filtra per Categoria</label>
                        <select class="form-select" id="filtro-categoria">
                            <option value="">Tutte le categorie</option>
                            <option value="Alimentari">Alimentari</option>
                            <option value="Trasporti">Trasporti</option>
                            <option value="Intrattenimento">Intrattenimento</option>
                            <option value="Bollette">Bollette</option>
                            <option value="Altro">Altro</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-6">
                        <label for="ricerca-descrizione" class="form-label my-2">Cerca per Descrizione</label>
                        <input type="text" class="form-control" id="ricerca-descrizione" placeholder="Inserisci testo da cercare...">
                    </div>
                </div>
            </div>
        </div>
        <div class="table-responsive p-2 p-md-4 m-0 d-none d-md-block">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Data</th>
                        <th>Descrizione</th>
                        <th>Categoria</th>
                        <th>Importo</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody id="lista-spese-corpo">
                </tbody>
            </table>
        </div>
        
        <!-- VERSIONE MOBILE: CARD VIEW -->
        <div class="d-md-none">
            <div id="lista-spese-mobile" class="row g-3 px-2">
                <!-- Le card verranno generate dinamicamente -->
            </div>
        </div>
    </section>
    <!-- FINE VISUALIZZAZIONE SPESA -->

    <!-- Script JS -->
    <script src="./main.js"></script>

    <!-- Script Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
